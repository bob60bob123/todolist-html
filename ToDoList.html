        const progress = total > 0 ? Math.round((completed / total) * 100) : 0;

        const highP = ptodos.filter(t => !t.completed && t.priority === 'high').length;
        const medP = ptodos.filter(t => !t.completed && t.priority === 'medium').length;
        const lowP = ptodos.filter(t => !t.completed && t.priority === 'low').length;
        const cHigh = ptodos.filter(t => t.completed && t.priority === 'high').length;
        const cMed = ptodos.filter(t => t.completed && t.priority === 'medium').length;
        const cLow = ptodos.filter(t => t.completed && t.priority === 'low').length;

        let emoji, msg;
        if (total === 0) { emoji = '✨'; msg = '还没有添加待办事项'; }
        else if (progress === 100) { emoji = '🎉'; msg = '太棒了！全部完成！'; }
        else if (progress >= 70) { emoji = '💪'; msg = `已完成 ${completed} 项，还剩 ${remaining} 项，马上完成！`; }
        else if (progress >= 40) { emoji = '🚀'; msg = `已完成 ${completed} 项，稳步推进中！`; }
        else if (progress > 0) { emoji = '📈'; msg = `已完成 ${completed} 项，开了个好头！`; }
        else { emoji = '🎯'; msg = `${remaining} 项任务待完成`; }

        const pLabels = { past1d: '过去1日', past2d: '过去2日', past3d: '过去3日', pastweek: '过去一周', day: '今日', week: '本周', month: '本月', quarter: '本季', year: '本年' };

        container.innerHTML = `
            <div class="summary-section">
                <div class="summary-section-title">📈 完成进度 · ${pLabels[currentPeriod] || ''}</div>
                <div class="progress-wrap">
                    <div class="progress-bar-bg"><div class="progress-bar" style="width:${progress}%"></div></div>
                    <div class="progress-label">${completed} / ${total} (${progress}%)</div>
                </div>
            </div>
            <div class="summary-section">
                <div class="summary-stats">
                    <div class="summary-stat-box accent"><div class="num">${completed}</div><div class="label">已完成</div></div>
                    <div class="summary-stat-box"><div class="num">${remaining}</div><div class="label">待完成</div></div>
                </div>
            </div>
            ${remaining > 0 ? `
            <div class="summary-section">
                <div class="summary-section-title">⚡ 待办优先级</div>
                <div class="priority-summary">
                    <div class="priority-badge high"><span class="num">${highP}</span><span class="label">十分紧急</span></div>
                    <div class="priority-badge medium"><span class="num">${medP}</span><span class="label">较为紧急</span></div>
                    <div class="priority-badge low"><span class="num">${lowP}</span><span class="label">一般</span></div>
                </div>
            </div>` : ''}
            ${completed > 0 ? `
            <div class="summary-section">
                <div class="summary-section-title">✅ 已完成</div>
                <div class="summary-list">
                    ${cHigh > 0 ? `<div class="summary-list-item"><span>🔴</span><span class="text">十分紧急</span><span class="count">${cHigh} 项</span></div>` : ''}
                    ${cMed > 0 ? `<div class="summary-list-item"><span>🟠</span><span class="text">较为紧急</span><span class="count">${cMed} 项</span></div>` : ''}
                    ${cLow > 0 ? `<div class="summary-list-item"><span>🟢</span><span class="text">一般</span><span class="count">${cLow} 项</span></div>` : ''}
                </div>
            </div>` : ''}
            <div class="summary-section">
                <div class="summary-message">
                    <span class="emoji">${emoji}</span>
                    <div class="text">${msg}</div>
                </div>
                <button class="btn-report" onclick="generateReport()">📋 生成工作汇报</button>
            </div>`;
    }

    function renderCustomDateSummary(container) {
        const d = new Date(customDate);
        const s = new Date(d); s.setHours(0,0,0,0);
        const e = new Date(d); e.setHours(23,59,59,999);
        const created = todos.filter(t => { const time = t.createTime||t.createdAt; if(!time)return false; const c=new Date(time); return c>=s&&c<=e; });
        const done = todos.filter(t => t.completed&&t.completedAt ? (new Date(t.completedAt)>=s&&new Date(t.completedAt)<=e) : false);
        const remain = created.filter(t => !t.completed);
        const dateStr = `${d.getMonth()+1}月${d.getDate()}日`;
        const plabels = { high:'十分紧急', medium:'较为紧急', low:'一般' };
        const ci = created.map(t => `<div class="summary-list-item ${t.completed?'completed-item':''}"><span>${t.completed?'✅':'○'}</span><span class="text">${escapeHtml(t.text)}</span></div>`).join('')||'<div class="empty-tip">0</div>';
        const di = done.map(t => `<div class="summary-list-item completed-item"><span>✅</span><span class="text">${escapeHtml(t.text)}</span></div>`).join('')||'<div class="empty-tip">0</div>';
        container.innerHTML = `
            <div class="back-to-today"><button class="back-btn" onclick="resetToToday()">← 返回今日</button><span class="date-label">${dateStr}</span></div>
            <div class="summary-section"><div class="summary-stats">
                <div class="summary-stat-box"><div class="num">${created.length}</div><div class="label">新建</div></div>
                <div class="summary-stat-box accent"><div class="num">${done.length}</div><div class="label">完成</div></div>
                <div class="summary-stat-box"><div class="num">${remain.length}</div><div class="label">待完成</div></div>
            </div></div>
            <div class="summary-section"><div class="summary-section-title">📝 新建（${created.length}）</div><div class="summary-list">${ci}</div></div>
            <div class="summary-section"><div class="summary-section-title">✅ 完成（${done.length}）</div><div class="summary-list">${di}</div></div>`;
    }

    function resetToToday() {
        customDate = null; currentPeriod = 'day'; currentFilter = 'all';
        document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
        document.querySelector('.filter-tab[data-filter="all"]').classList.add('active');
        switchSummaryPeriod('day');
        renderTodos();
    }

    function exportTodoList(format) {
        let et = todos;
        if (currentFilter === 'active') et = todos.filter(t => !t.completed);
        else if (currentFilter === 'completed') et = todos.filter(t => t.completed);
        if (!et.length) { alert('暂无待办事项可导出'); return; }
        if (format === 'xlsx') exportToExcel(et);
        else exportToDocx(et);
    }

    function exportToExcel(et) {
        const now = new Date();
        const ds = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}`;
        const pl = { high:'十分紧急', medium:'较为紧急', low:'一般' };
        const data = [['状态','事项内容','优先级','创建时间','完成时间']];
        et.forEach(t => data.push([t.completed?'已完成':'待完成', t.text, pl[t.priority]||'一般', t.createTime?new Date(t.createTime).toLocaleString('zh-CN'):'', t.completedAt?new Date(t.completedAt).toLocaleString('zh-CN'):'']));
        data.push([],['统计'],['总计',et.length],['十分紧急',et.filter(t=>t.priority==='high').length],['较为紧急',et.filter(t=>t.priority==='medium').length],['一般',et.filter(t=>t.priority==='low').length]);
        const ws = XLSX.utils.aoa_to_sheet(data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, '待办清单');
        ws['!cols'] = [{wch:10},{wch:40},{wch:12},{wch:20},{wch:20}];
        XLSX.writeFile(wb, `待办清单_${ds}.xlsx`);
    }

    function exportToDocx(et) {
        const { Document, Packer, Paragraph, TextRun } = docx;
        const now = new Date();
        const ds = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日`;
        const pl = { high:'十分紧急', medium:'较为紧急', low:'一般' };
        const children = [
            new Paragraph({ children: [new TextRun({ text:`待办事项清单 ${ds}`, bold:true, size:32 })], spacing:{ before:200, after:400 } }),
            new Paragraph({ children: [new TextRun({ text:`共计 ${et.length} 项`, size:24 })], spacing:{ after:400 } })
        ];
        const groups = [
            { key:'high', label:'【十分紧急】', color:'FF0000', items:et.filter(t=>t.priority==='high') },
            { key:'medium', label:'【较为紧急】', color:'FF8C00', items:et.filter(t=>t.priority==='medium') },
            { key:'low', label:'【一般】', color:'228B22', items:et.filter(t=>t.priority==='low') }
        ];
        groups.forEach(g => {
            if (!g.items.length) return;
            children.push(new Paragraph({ children:[new TextRun({ text:g.label, bold:true, color:g.color })], spacing:{ before:300, after:200 } }));
            g.items.forEach(t => {
                const s = t.completed?'✓':'○';
                children.push(new Paragraph({ children:[new TextRun({ text:`${s} ${t.text}`, color:t.completed?'888888':'000000' })], spacing:{ before:100, after:100 } }));
            });
        });
        const doc = new Document({ sections:[{ properties:{}, children }] });
        const fds = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}`;
        Packer.toBlob(doc).then(blob => {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `待办清单_${fds}.docx`;
            a.click(); URL.revokeObjectURL(url);
            playSound('complete');
        }).catch(() => alert('导出失败，请重试'));
    }

    function importTodoList(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const data = new Uint8Array(e.target.result);
                const wb = XLSX.read(data, { type:'array' });
                const ws = wb.Sheets[wb.SheetNames[0]];
                const jd = XLSX.utils.sheet_to_json(ws, { header:1 });
                let cnt = 0;
                const pm = { '十分紧急':'high', '较为紧急':'medium', '一般':'low' };
                for (let i=1; i<jd.length; i++) {
                    const r = jd[i];
                    if (['统计','总计','十分紧急','较为紧急','一般'].includes(r[0])) continue;
                    if (!r[1] || !r[1].toString().trim()) continue;
                    todos.push({ id:Date.now()+i, text:r[1].toString().trim(), priority:pm[r[2]]||'low', completed:r[0]==='已完成', createTime:new Date().toISOString() });
                    cnt++;
                }
                saveTodos(); renderTodos(); renderSummary();
                alert(`成功导入 ${cnt} 条待办事项！`);
                playSound('add');
            } catch(err) { playSound('error'); alert('导入失败，请检查文件格式'); }
        };
        reader.readAsArrayBuffer(file);
        event.target.value = '';
    }

    function generateReport() {
        const ptodos = filterTodosByPeriod(currentPeriod);
        const completed = ptodos.filter(t => t.completed);
        const remaining = ptodos.filter(t => !t.completed);
        const total = ptodos.length;
        const pLabels = { past1d:'过去1日', past2d:'过去2日', past3d:'过去3日', pastweek:'过去一周', day:'今日', week:'本周', month:'本月', quarter:'本季', year:'本年' };
        const now = new Date();
        let dateStr;
        if (currentPeriod==='day') dateStr=`${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日`;
        else if (currentPeriod==='week') { const r=getPeriodRange('week'); dateStr=`${r.start.getMonth()+1}月${r.start.getDate()}日-${r.end.getMonth()+1}月${r.end.getDate()}日`; }
        else if (currentPeriod==='month') dateStr=`${now.getFullYear()}年${now.getMonth()+1}月`;
        else if (currentPeriod==='quarter') dateStr=`${now.getFullYear()}年第${Math.floor(now.getMonth()/3)+1}季度`;
        else dateStr=`${now.getFullYear()}年`;

        const cHigh = completed.filter(t=>t.priority==='high');
        const cMed = completed.filter(t=>t.priority==='medium');
        const cLow = completed.filter(t=>t.priority==='low');

        let report = `【${dateStr} ${pLabels[currentPeriod]}工作汇报】\n\n`;
        if (total===0) report += `一、工作概况\n${pLabels[currentPeriod]}暂无安排工作。\n`;
        else {
            report += `一、工作概况\n${pLabels[currentPeriod]}共安排 ${total} 项任务，已完成 ${completed.length} 项，完成率 ${total>0?Math.round(completed.length/total*100):0}%。\n`;
            if (completed.length>0) {
                report += `\n二、完成情况\n`;
                if (cHigh.length>0) { report+=`\n1. 十分紧急事项（${cHigh.length}项）\n`; cHigh.forEach(i=>report+=`   ✓ ${i.text}\n`); }
                if (cMed.length>0) { report+=`\n2. 较为紧急事项（${cMed.length}项）\n`; cMed.forEach(i=>report+=`   ✓ ${i.text}\n`); }
                if (cLow.length>0) { report+=`\n3. 一般事项（${cLow.length}项）\n`; cLow.forEach(i=>report+=`   ✓ ${i.text}\n`); }
            }
            if (remaining.length>0) {
                report += `\n三、待推进事项（${remaining.length}项）\n`;
                remaining.forEach((i,idx)=>report+=`${idx+1}. ${i.priority==='high'?'[十分紧急]':i.priority==='medium'?'[较为紧急]':'[一般]'} ${i.text}\n`);
            }
            const prog = completed.length/total*100;
            report += `\n四、工作小结\n`;
            if (prog===100) report += `${pLabels[currentPeriod]}任务全部完成！`;
            else if (prog>=70) report += `${pLabels[currentPeriod]}大部分任务已完成，剩余事项需尽快推进。`;
            else if (prog>=40) report += `${pLabels[currentPeriod]}任务完成过半，需加强时间管理。`;
            else if (prog>0) report += `${pLabels[currentPeriod]}完成率偏低，需优化工作方法。`;
            else report += `${pLabels[currentPeriod]}任务尚未启动，需尽快开始。`;
        }

        document.getElementById('reportModalTitle').textContent = `📋 ${dateStr} 工作汇报`;
        document.getElementById('reportText').textContent = report;
        document.getElementById('reportModal').classList.add('show');
    }

function copyReport() {
        const t = document.getElementById('reportText').textContent;
        navigator.clipboard.writeText(t).then(() => {
            const btn = document.getElementById('copyBtn');
            btn.textContent = '✅ 已复制';
            btn.classList.add('copied');
            playSound('complete');
            setTimeout(() => { btn.textContent = '📋 复制汇报'; btn.classList.remove('copied'); }, 2000);
        }).catch(() => {
            const ta = document.createElement('textarea');
            ta.value = t; document.body.appendChild(ta); ta.select();
            document.execCommand('copy'); document.body.removeChild(ta);
            playSound('complete');
        });
    }

    function exportReportDocx() {
        const { Document, Packer, Paragraph, TextRun } = docx;
        const reportText = document.getElementById('reportText').textContent;
        const title = document.getElementById('reportModalTitle').textContent.replace('📋 ', '');
        const now = new Date();
        const fds = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}`;
        const lines = reportText.split('\n');
        const children = [
            new Paragraph({ children: [new TextRun({ text: title, bold: true, size: 36 })], spacing: { before: 200, after: 400 } })
        ];
        lines.forEach(line => {
            if (line.trim()) {
                children.push(new Paragraph({
                    children: [new TextRun({ text: line, size: 24 })],
                    spacing: { before: 60, after: 60 }
                }));
            } else {
                children.push(new Paragraph({ children: [new TextRun({ text: '' })], spacing: { before: 100, after: 100 } }));
            }
        });
        const doc = new Document({ sections: [{ properties: {}, children }] });
        Packer.toBlob(doc).then(blob => {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `工作汇报_${fds}.docx`;
            a.click(); URL.revokeObjectURL(url);
            playSound('complete');
        }).catch(() => alert('导出失败，请重试'));
    }

    function closeReportModal() {
        document.getElementById('reportModal').classList.remove('show');
    }

    document.getElementById('reportModal').addEventListener('click', function(e) {
        if (e.target === this) closeReportModal();
    });

    document.addEventListener('click', function(e) {
        const dropdown = document.querySelector('.export-dropdown');
        const menu = document.getElementById('exportMenu');
        if (dropdown && !dropdown.contains(e.target)) {
            menu.style.display = 'none';
            dropdown.classList.remove('open');
        }
    });
</script>
</body>
